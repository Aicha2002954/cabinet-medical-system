# Configuration de base
server.port=8087
spring.application.name=api-gateway

# Eureka Client (للتسجيل في Discovery Service)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Activation de la découverte dynamique des services
spring.cloud.discovery.enabled=true
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Routes explicites (pour éviter toute ambiguïté)
spring.cloud.gateway.routes[0].id=security-service
spring.cloud.gateway.routes[0].uri=lb://security-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/v1/users/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[1].id=patient-service
spring.cloud.gateway.routes[1].uri=lb://patient-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/patients/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[2].id=consultation-service
spring.cloud.gateway.routes[2].uri=lb://consultation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/consultations/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[3].id=rendezvous-service
spring.cloud.gateway.routes[3].uri=lb://rendezvous-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/rendezvous/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[4].id=facturation-service
spring.cloud.gateway.routes[4].uri=lb://facturation-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/factures/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0

# User Service Route
spring.cloud.gateway.routes[5].id=user-service
spring.cloud.gateway.routes[5].uri=lb://user-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/profiles/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

# CORS – حل واحد فقط (بدون تكرار)
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# منع تكرار header Access-Control-Allow-Origin (إذا كان يأتي من الخدمات الأخرى)
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# RSA public key (لـ JWT)
rsa.public-key=classpath:keys/publicKey.pem

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG